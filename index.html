<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CICSA CONNECT PRO - Centro de Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body>
  <header class="topbar">
    <div class="topbar-left">
      <img src="assets/logo_carso.png" alt="CICSA" class="top-logo" />
      <div class="header-divider"></div>
      <div class="header-info">
        <h1>CICSA CONNECT <span>PRO</span></h1>
        <small>CENTRO DE MONITOREO GEOSAC - CLARO</small>
      </div>
    </div>
    <div id="status" class="status-badge gray">Iniciando...</div>
    <div class="topbar-right">
      <button id="btnExportKML" class="btn-icon" style="background: rgba(16, 185, 129, 0.1); border-color: #10b981; color: #10b981;">🗺️ Rutas (KML)</button>
      <button id="btnExportCSV" class="btn-icon">📥 Reporte</button>
      <button onclick="location.reload()" class="btn-icon">⟳ Actualizar</button>
    </div>
  </header>

  <div class="main-layout">
    <div id="map"></div>
    <aside class="sidebar" id="mainSidebar">
      <button id="btnToggleSidebar" class="btn-toggle-sidebar" title="Ocultar Panel">◀</button>
      <div class="sidebar-stats">
        <div class="stat-box"><span id="countOnline">0</span><small>Online</small></div>
        <div class="stat-box warn"><span id="countMid">0</span><small>Alerta</small></div>
        <div class="stat-box off"><span id="countOff">0</span><small>Inactivos</small></div>
      </div>
      <div class="sidebar-scrollable">
        <div class="control-section">
          <h3 class="section-label">Calculadora de Rutas</h3>
          <div class="search-box-container">
            <input id="siteSearch" type="text" class="premium-input" placeholder="📍 Site o Lat, Lng..."
              autocomplete="off" />
            <button id="btnClearRoute" class="btn-clear-map" title="Limpiar Mapa">✕</button>
            <div id="siteSuggestions" class="suggestions-box"></div>
          </div>
          <div id="routesPanel" class="routes-panel"></div>
        </div>
        <div class="control-section">
          <h3 class="section-label">Filtros Operativos</h3>
          <input id="filterBrigada" type="text" class="premium-input" placeholder="🔍 Filtrar Brigada..." />
          <div class="inputs-row">
            <select id="filterZona" class="premium-input">
              <option value="">Todas las Zonas</option>
            </select>
            <select id="filterContrata" class="premium-input">
              <option value="">Todas las Contratas</option>
            </select>
            <select id="filterStatus" class="premium-input">
              <option value="">Estado: Todos</option>
              <option value="online">🟢 Online</option>
              <option value="mid">🟠 Alerta</option>
              <option value="off">⚫ Offline</option>
            </select>
          </div>
        </div>
        <div class="control-section">
          <h3 class="section-label">Estado de Brigadas</h3>
          <div id="userList" class="brigada-list"></div>
        </div>
      </div>
    </aside>
    <div class="map-controls-island">
      <button class="island-btn" id="btnCenter">🎯</button>
      <div class="island-divider"></div>
      <select id="mapStyleSelect" class="island-select">
        <option value="osm" selected>🌍 Capa Gratis</option>
        <option value="streets">🏙️ Mapbox Calles</option>
        <option value="satellite">🛰️ Satelital</option>
      </select>
    </div>
  </div>
  <div id="kmlModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <h3 style="margin-top:0; color:#10b981; font-weight: 900; letter-spacing: 1px;">🗺️ Exportar Ruta Diaria</h3>
      <label>Seleccionar Brigada:</label>
      <select id="kmlBrigadaSelect" class="premium-input"></select>
      <label>Día a exportar:</label>
      <input type="date" id="kmlDateSelect" class="premium-input" />
      <div style="display: flex; gap: 10px; margin-top: 25px;">
        <button id="btnGenerateKML" class="btn-icon" style="flex:1; background:#10b981; border-color:#10b981; color:#fff;">Generar KMZ/KML</button>
        <button id="btnCloseKmlModal" class="btn-icon" style="flex:1;">Cancelar</button>
      </div>
    </div>
  </div>
  <div id="toastContainer" class="toast-container"></div>
  <script src="config.js"></script>
  <script src="main.js"></script>
</body>

</html>

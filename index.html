<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoreo GPS - Brigadas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.7.1/dist/jszip.min.js"></script>
</head>

<body>
  <header class="topbar">
    <div class="topbar-left">
      <img src="assets/logo_carso.png" alt="CARSO" class="top-logo" onerror="this.style.display='none'" />
      <h1>Monitoreo GPS <span>- Brigadas</span></h1>
    </div>
    <div id="status" class="status-badge gray">Cargando...</div>
    <div class="topbar-right">
      <button id="btnRefresh" class="btn-small">⟳ Actualizar</button>
      <button class="btn-small">⚙ Configuración</button>
    </div>
  </header>

  <div class="main-layout">
    <main class="map-wrapper">
      <div id="map" class="map-container"></div>

      <aside class="sidebar">
        <div class="sidebar-header">
          <h2 class="sidebar-title">Panel de Control</h2>
          <span class="sidebar-subtitle">Supervisión en tiempo real</span>
        </div>

        <div class="sidebar-scrollable">
          
          <div class="control-section">
            <h3 class="section-label">Filtros de visualización</h3>
            <div class="inputs-stack">
              <input id="filterName" type="text" class="premium-input" placeholder="🔍 Buscar técnico..." autocomplete="off" />
              <input id="filterBrigada" type="text" class="premium-input" placeholder="🔍 Buscar brigada..." autocomplete="off" />
              <div class="inputs-row">
                <select id="filterZona" class="premium-input"><option value="">Zona: Todas</option></select>
                <select id="filterContrata" class="premium-input"><option value="">Contrata: Todas</option></select>
              </div>
              <select id="filterStatus" class="premium-input">
                <option value="">Estado: Todos</option>
                <option value="online">🟢 Conectados (≤2 min)</option>
                <option value="mid">🟡 Medio (≤5 min)</option>
                <option value="off">⚫ Inactivos (&gt;5 min)</option>
              </select>
            </div>
          </div>

          <div class="control-section">
            <h3 class="section-label">Calculadora de Rutas</h3>
            <div style="position: relative;">
              <input id="siteSearch" type="text" class="premium-input" placeholder="📍 Buscar Site o Coord (-12.04, -77.02)" autocomplete="off" />
              <div id="siteSuggestions" class="suggestions-box"></div>
            </div>
            <div class="buttons-row">
              <button id="btnBuscarSite" class="btn-primary">🚐 Buscar Cercanos</button>
              <button id="btnClearSearch" class="btn-secondary" style="display: none;">✖ Limpiar</button>
            </div>
          </div>

          <div id="routesPanel" class="routes-panel"></div>

          <div class="control-section list-container">
            <h3 class="section-label" style="margin-bottom: 8px;">Brigadas Activas</h3>
            <div id="userList" class="brigada-list"></div>
          </div>

        </div>
      </aside>

      <div class="map-controls-island">
        <button class="island-btn" id="btnCenter" title="Centrar Lima">🎯</button>
        <button class="island-btn" id="btnShowAll" title="Ver todos">👁</button>
        <button class="island-btn" id="btnToggleCluster" title="Alternar Agrupación">🌐</button>
        <div class="island-divider"></div>
        <select id="mapStyleSelect" class="island-select">
          <option value="streets" selected>Streets</option>
          <option value="dark">Dark</option>
          <option value="satellite">Satélite</option>
          <option value="osm">OSM</option>
        </select>
      </div>

      <div class="kmz-floating-panel">
        <label for="kmzDate">Exportar historial (KMZ)</label>
        <input id="kmzDate" type="date" class="premium-input" />
        <button id="exportKmzBtn" class="btn-primary" style="width: 100%;">📍 Generar Archivo KMZ</button>
      </div>

    </main>
  </div>

  <script src="config.js"></script>
  <script src="main.js"></script>
</body>
</html>
